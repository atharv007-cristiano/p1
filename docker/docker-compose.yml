version: '3.8'

services:
  # 1. PostgreSQL Compliance Database
  db:
    image: postgres:15-alpine
    container_name: deepshield_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deepshield_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Message Broker & Websocket Channels
  redis:
    image: redis:7-alpine
    container_name: deepshield_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. FastAPI REST/WebSocket API Gateway (Gate 2 Orchestrator)
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: deepshield_backend
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=deepshield_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. Celery Asynchronous Forensic Workers
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: deepshield_worker
    restart: always
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=1
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=deepshield_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ../backend:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 5. Next.js App Router Client (Gate 1 Sandbox)
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: deepshield_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
