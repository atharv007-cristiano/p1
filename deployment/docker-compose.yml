version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: deepshield_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deepshield_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Queue & Sockets PubSub
  redis:
    image: redis:7-alpine
    container_name: deepshield_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. FastAPI REST Gateway Server
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: deepshield_backend
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=deepshield_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DEEPSHIELD_SECRET_KEY=7b94924c568f237efb7c6ee9b74052f6b8969ea2dfdf9037c22998a4da07ea62
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/workspace/app
      - ../core:/workspace/core
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. Celery Asynchronous GPU/CPU worker
  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: deepshield_worker
    restart: always
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=deepshield_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ../backend/app:/workspace/app
      - ../core:/workspace/core
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 5. React Dashboard Client
  frontend:
    image: node:18-alpine
    container_name: deepshield_frontend
    restart: always
    working_dir: /app
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  postgres_data:
